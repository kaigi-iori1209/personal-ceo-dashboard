<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#151515">
  <title>TODO Roadmap</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Personal CEO Workspace</p>
        <h1>TODO & Roadmap</h1>
      </div>
      <div class="summary">
        <span id="totalCount">未完了 0</span>
        <span id="doneCount">完了 0</span>
      </div>
    </header>

    <nav class="tab-nav" aria-label="画面切り替え">
      <button class="tab-button active" type="button" data-tab="today"><span>🏠</span>Today</button>
      <button class="tab-button" type="button" data-tab="tasks"><span>✓</span>Tasks</button>
      <button class="tab-button" type="button" data-tab="roadmap"><span>🎯</span>Roadmap</button>
      <button class="tab-button" type="button" data-tab="log"><span>📜</span>Log</button>
    </nav>

    <section class="tab-panel active" data-panel="today">
      <section class="panel today-panel">
        <div class="goal-strip">
          <span>最終目標</span>
          <strong id="todayFinalGoal">未設定</strong>
        </div>
        <div class="panel-head compact-head">
          <h2>今日やること</h2>
        </div>
        <div id="focusList" class="focus-list"></div>
        <div class="mini-progress">
          <div class="progress-label">
            <span>今週達成率</span>
            <span id="weeklyRateText">0%</span>
          </div>
          <div class="progress-track">
            <div id="weeklyRateBar" class="progress-bar"></div>
          </div>
        </div>
      </section>
    </section>

    <section class="tab-panel" data-panel="tasks">
      <section class="panel tasks-panel">
        <div class="panel-head">
          <h2>Tasks</h2>
          <div class="toolbar">
            <select id="filterInput" aria-label="カテゴリで絞り込み">
              <option value="all">すべて</option>
              <option>仕事</option>
              <option>副業</option>
              <option>動画制作</option>
              <option>学習</option>
              <option>生活</option>
              <option>その他</option>
            </select>
          </div>
        </div>

        <form id="todoForm" class="form-panel hidden">
          <div class="panel-head">
            <h2 id="formTitle">New TODO</h2>
            <button id="cancelEdit" type="button" class="secondary">閉じる</button>
          </div>
          <label>タイトル<input id="titleInput" name="title" type="text" required placeholder="例: ポートフォリオを更新"></label>
          <div class="grid-2">
            <label>カテゴリ
              <select id="categoryInput" name="category">
                <option>仕事</option>
                <option>副業</option>
                <option>動画制作</option>
                <option>学習</option>
                <option>生活</option>
                <option>その他</option>
              </select>
            </label>
            <label>優先度
              <select id="priorityInput" name="priority">
                <option>高</option>
                <option selected>中</option>
                <option>低</option>
              </select>
            </label>
          </div>
          <label>期限<input id="dueInput" name="due" type="date"></label>
          <label>URL<input id="urlInput" name="url" type="url" placeholder="https://example.com"></label>
          <label>メモ<textarea id="memoInput" name="memo" rows="4" placeholder="補足やリンクなど"></textarea></label>
          <button id="submitButton" type="submit">追加する</button>
        </form>

        <div id="todoList" class="todo-list"></div>
        <button id="openTodoForm" class="fab" type="button" aria-label="TODOを追加">＋</button>
      </section>
    </section>

    <section class="tab-panel" data-panel="roadmap">
      <section class="panel roadmap-panel">
        <div class="panel-head">
          <h2>Roadmap</h2>
          <button id="toggleRoadmapEdit" type="button" class="secondary">編集</button>
        </div>
        <form id="roadmapForm" class="roadmap-editor hidden">
          <div class="goal-grid">
            <label>最終目標<textarea data-goal="finalGoal" rows="3"></textarea></label>
            <label>1年後<textarea data-goal="oneYear" rows="3"></textarea></label>
            <label>半年後<textarea data-goal="sixMonths" rows="3"></textarea></label>
            <label>3ヶ月後<textarea data-goal="threeMonths" rows="3"></textarea></label>
            <label>今月<textarea data-goal="thisMonth" rows="3"></textarea></label>
            <label>今日<textarea data-goal="today" rows="3"></textarea></label>
          </div>
          <button id="saveGoalTree" type="button">保存</button>
        </form>
        <div id="roadmapView" class="roadmap-flow"></div>
      </section>
    </section>

    <section class="tab-panel" data-panel="log">
      <section class="panel log-panel">
        <div class="panel-head">
          <h2>Done Log</h2>
        </div>
        <div id="doneLog" class="done-log"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
